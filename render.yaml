services:
  - type: web
    name: pixiuflow-g02
    runtime: python
    rootDir: project/pixiuflow
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: pixiuflow-g02-db
          property: connectionString

databases:
  - name: pixiuflow-g02-db
    databaseName: pixiuflow_g02
    user: pixiuflow_g02
